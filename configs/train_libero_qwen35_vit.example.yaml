dataset:
  libero_hdf5_root: data/libero
  action_stats_json: outputs/libero_action_stats.json
  libero_val_ratio: 0.02
  libero_sample_stride: 1

model:
  qwen_path: pretrained_models/Qwen3.5-2B
  action_query_tokens: 64
  action_dim: 7
  action_horizon: 8
  proprio_dim: 8

vision:
  pretrained: true
  cache_dir: pretrained_models/vision_cache/hf
  token_align: interpolate

policy:
  policy_hidden_size: 1024
  raw_token_budget: 512

trainable:
  language_model: false
  vision_backbone: false
  vision_projector: true
  action_queries: true
  conditioning: true
  action_head: true
  proprio_projector: true

lora:
  use_lora: true
  target: language_model
  rank: 64
  alpha:
  dropout: 0.0
  target_modules: all-linear

training:
  output_dir: outputs/qwen35_vit_libero
  max_steps: 100000
  batch_size: 1
  grad_accumulation_steps: 16
  learning_rate: 0.0002
  warmup_steps: 0
  save_every_steps: 10000
  log_every_steps: 10
  device: cuda
  amp_dtype: bfloat16

logging:
  wandb: false
  wandb_project: vla_adapter_qwen35_vit
  wandb_mode: offline
